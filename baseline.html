<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baseline Information | Smart Meal Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body class="page">
    <main class="page-shell">
      <header class="page-header page-header-centered">
        <div class="page-nav page-nav-inline">
          <a class="text-link text-link-premium" href="./index.html">Home</a>
        </div>
        <div class="page-title-block">
          <div
            class="step-progress"
            role="progressbar"
            aria-label="Progress through setup"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="33"
          >
            <span class="step-progress-fill" style="width: 33.333%"></span>
          </div>
          <h1>Start with your Basics</h1>
        </div>
      </header>

      <section class="form-card">
        <p class="section-copy section-copy-centered">
          Tell us a little about yourself so we can shape meal suggestions in a
          beginner-friendly and realistic way.
        </p>

        <form id="baseline-form" novalidate>
          <div class="question-flow">
            <label class="field question-card">
              <span class="question-label">Age</span>
              <div id="age-dropdown" class="custom-dropdown-host"></div>
            </label>

            <label class="field question-card">
              <span class="question-label">Height</span>
              <div id="height-dropdown" class="custom-dropdown-host"></div>
            </label>

            <label class="field question-card">
              <span class="question-label">Weight</span>
              <div id="weight-dropdown" class="custom-dropdown-host"></div>
            </label>

            <label class="field question-card">
              <span class="question-label">Activity level</span>
              <div id="activityLevel-dropdown" class="custom-dropdown-host"></div>
            </label>

            <label class="field question-card">
              <span class="question-label">Healthy goal</span>
              <div id="healthyGoal-dropdown" class="custom-dropdown-host"></div>
            </label>

            <label class="field question-card">
              <span class="question-label">Dietary concern or health condition</span>
              <div id="healthConcern-dropdown" class="custom-dropdown-host"></div>
            </label>
          </div>

          <p id="baseline-error" class="error-text" role="alert"></p>

          <div class="form-actions">
            <button class="primary-button" type="submit">Continue</button>
          </div>
        </form>
      </section>
    </main>

    <script src="./js/storage.js"></script>
    <script src="./js/form-ui.js"></script>
    <script src="./js/baseline.js"></script>
  </body>
</html>
